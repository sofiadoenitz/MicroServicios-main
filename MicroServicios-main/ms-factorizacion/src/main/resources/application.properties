# Nombre del microservicio
spring.application.name=ms-factorizacion

# Puerto
server.port=8085

# Base de datos
spring.datasource.url=jdbc:mysql://localhost:3306/db_factorizacion?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=root

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true

# Swagger
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/doc/swagger-ui.html
springdoc.api-docs.path=/api-docs

# Logs
logging.level.root=INFO 
logging.level.com.factorizacion.informe=DEBUG 
logging.level.org.hibernate.SQL=DEBUG
logging.file.name=factorizacion-application.log